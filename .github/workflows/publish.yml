name: Publish to PyPI

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify release commit descends from protected main
        shell: bash
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - name: Install reproducible release dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy "build>=1,<2" "pytest>=7.4"
      - name: Verify projection receipt and public-safe release tests
        run: |
          python -m release.build_public --verify-receipt --json
          python -m pytest -q release/tests
      - name: Re-run publication gates and wheel scan
        run: python -m release.build_public --json
      - name: Build wheel and sdist
        run: python -m build
      - name: Assert community artifact boundary
        run: |
          python - <<'PY'
          import glob, zipfile
          wheel = sorted(glob.glob("dist/*.whl"))[-1]
          with zipfile.ZipFile(wheel) as archive:
              names = archive.namelist()
          held = [name for name in names if name.startswith("exocortex/tuner")]
          assert not held, f"held package leaked into wheel: {held[:5]}"
          tops = {name.split("/", 1)[0] for name in names}
          assert {"sentaince", "exocortex", "cerebral"} <= tops, f"missing community packages: {tops}"
          print("wheel clean:", wheel)
          PY
      - uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
