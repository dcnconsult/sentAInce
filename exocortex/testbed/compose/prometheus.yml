global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: exocortex
    # The exporter is a compose service on the same network (was host.docker.internal:9109 when native).
    # It serves every repo's metrics in one scrape, each series labelled repo="<name>".
    static_configs:
      - targets: ["exporter:9109"]
