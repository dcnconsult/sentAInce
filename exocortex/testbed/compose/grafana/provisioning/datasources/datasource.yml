apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus            # fixed uid so the provisioned dashboard can reference it deterministically
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
  - name: Loki
    type: loki
    uid: loki                  # fixed uid → the dashboard's "Live audit tail" logs panel references it
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 500
